<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>代購管理工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --pink: #D4537E;
  --pink-light: #FBEAF0;
  --pink-mid: #ED93B1;
  --pink-dark: #99355A;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --orange: #E8936A;
  --orange-light: #FEF0E8;
  --red: #E24B4A;
  --red-light: #FCEBEB;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --gray: #FDF0F5;
  --text: #2a1520;
  --text-secondary: #7a4a5a;
  --text-tertiary: #c090a8;
  --bg: #FDE8F0;
  --card: #ffffff;
  --border: rgba(212,83,126,0.15);
  --border-strong: rgba(212,83,126,0.3);
  --radius: 12px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --text: #f5d0e0; --text-secondary: #c090a8; --text-tertiary: #7a4a5a;
    --bg: #1a0a10; --card: #2a1020; --border: rgba(212,83,126,0.2);
    --border-strong: rgba(212,83,126,0.35); --gray: #2a1520;
    --pink-light: #3a1525; --green-light: #0e2e20;
    --orange-light: #2e1a10; --red-light: #2e1010;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh;background:var(--bg)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--card);border-top:0.5px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;font-size:10px;font-family:inherit;color:var(--text-tertiary);display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn i{font-size:20px}
.nav-btn.active{color:var(--pink);font-weight:500}
.page{display:none;padding:16px}
.page.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-header h1{font-size:20px;font-weight:700}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
input[type=text],input[type=number],select,textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:var(--card);color:var(--text);margin-bottom:10px;outline:none}
input:focus,select:focus{border-color:var(--pink)}
input[readonly]{background:var(--gray);color:var(--text-secondary)}
label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px}
.btn{padding:10px 16px;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:13px;font-family:inherit;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--pink);color:#fff;border-color:var(--pink)}
.btn-sm{padding:6px 10px;font-size:12px}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-block{width:100%;justify-content:center}
.chip{display:inline-flex;align-items:center;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-strong);cursor:pointer;background:var(--card);color:var(--text)}
.chip.active{background:var(--pink);color:#fff;border-color:var(--pink)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-LINE{background:var(--green-light);color:#0F6E56}
.tag-FB{background:#E6F1FB;color:#185FA5}
.tag-IG{background:var(--orange-light);color:#993C1D}
.tag-Threads{background:#F0F0F0;color:#111111}
.tag-其他{background:var(--gray);color:var(--text-secondary)}
.tag-lotte{background:var(--pink-light);color:var(--pink-dark)}
.tag-maple{background:var(--green-light);color:#085041}
.tag-popup{background:var(--orange-light);color:#8a3a18}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:36px;margin-bottom:0}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text-tertiary);pointer-events:none}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-tertiary);margin:18px 0 8px}
.thumb-lg{width:52px;height:52px;border-radius:10px;object-fit:cover;border:0.5px solid var(--border);flex-shrink:0}
.thumb-ph{width:52px;height:52px;border-radius:10px;background:var(--gray);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.thumb-sm{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0}
.thumb-sm-ph{width:36px;height:36px;border-radius:8px;background:var(--gray);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.item-row:last-child{border-bottom:none}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border:1.5px solid var(--border-strong);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-box.checked{background:var(--pink);border-color:var(--pink)}
.check-box.checked::after{content:"✓";color:#fff;font-size:13px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.stat-box{border-radius:var(--radius-sm);padding:10px 12px}
.stat-box .lbl{font-size:11px;opacity:.75}
.stat-box .val{font-size:16px;font-weight:700;margin-top:3px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:14px 12px 24px;width:100%;max-height:92vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 18px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.img-upload{border:1.5px dashed var(--border-strong);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;margin-bottom:10px;position:relative;background:var(--gray)}
.img-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-upload img{max-width:100%;max-height:140px;border-radius:8px;object-fit:cover}
.price-badge{font-size:17px;font-weight:700;color:var(--pink)}
.order-note{font-size:11px;color:var(--text-tertiary);background:var(--gray);padding:4px 8px;border-radius:4px;margin-bottom:6px;display:inline-block}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:12px;object-fit:contain}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 12px;background:var(--pink-light);border-radius:var(--radius-sm);margin-bottom:12px;color:var(--pink-dark)}
.sync-bar.error{background:var(--red-light);color:var(--red)}
.sync-bar.success{background:var(--green-light);color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <div id="page-products" class="page active">
    <div class="page-header"><h1>商品資料庫</h1><button class="btn btn-sm btn-primary" onclick="openAddProduct()"><i class="ti ti-plus"></i> 新增</button></div>
    <div id="sync-status"></div>
    <div class="search-wrap"><i class="ti ti-search"></i><input type="text" id="prod-search" placeholder="搜尋商品名稱..." oninput="renderProducts()"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px" id="cat-chips"></div>
    <div id="prod-list"></div>
  </div>

  <div id="page-customers" class="page">
    <div class="page-header"><h1>客人管理</h1><button class="btn btn-sm btn-primary" onclick="openAddCustomer()"><i class="ti ti-plus"></i> 新增</button></div>
    <div id="cust-list"></div>
  </div>

  <div id="page-purchase" class="page">
    <div class="page-header"><h1>採購清單</h1></div>
    <div id="purchase-list"></div>
  </div>

  <div id="page-payment" class="page">
    <div class="page-header"><h1>帳款出貨</h1></div>
    <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
      <input type="date" id="pay-from" style="flex:1;margin:0;font-size:12px" onchange="renderPayments()">
      <span style="font-size:12px;color:var(--text-secondary)">～</span>
      <input type="date" id="pay-to" style="flex:1;margin:0;font-size:12px" onchange="renderPayments()">
      <button class="btn btn-sm" onclick="clearPayFilter()" style="font-size:11px;white-space:nowrap">清除</button>
    </div>
    <div id="payment-list"></div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-customers-btn" onclick="showPage('customers',this)"><i class="ti ti-users"></i>客人</button>
    <button class="nav-btn" onclick="showPage('purchase',this)"><i class="ti ti-shopping-cart"></i>採購</button>
    <button class="nav-btn" onclick="showPage('payment',this)"><i class="ti ti-coin"></i>帳款出貨</button>
    <button class="nav-btn" onclick="showPage('ledger',this)"><i class="ti ti-calculator"></i>記帳</button>
    <button class="nav-btn" onclick="showPage('products',this)"><i class="ti ti-package"></i>商品庫</button>
    <button class="nav-btn" onclick="showPage('settings',this)"><i class="ti ti-settings"></i>設定</button>
  </nav>

  <div id="page-ledger" class="page" style="padding:16px">
    <div class="page-header">
      <h1>記帳</h1>
      <button class="btn btn-sm btn-primary" onclick="openAddLedger()"><i class="ti ti-plus"></i> 新增</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
      <input type="date" id="ledger-from" style="flex:1;margin:0;font-size:12px" onchange="renderLedger()">
      <span style="font-size:12px;color:var(--text-secondary)">～</span>
      <input type="date" id="ledger-to" style="flex:1;margin:0;font-size:12px" onchange="renderLedger()">
      <button class="btn btn-sm" onclick="clearLedgerFilter()" style="font-size:11px;white-space:nowrap">清除</button>
    </div>
    <div id="ledger-summary" style="margin-bottom:12px"></div>
    <div id="ledger-list"></div>
  </div>

  <div id="page-settings" class="page" style="padding:16px">
    <div class="page-header"><h1>設定</h1></div>
  <div class="card">
    <div style="font-weight:500;margin-bottom:4px">同步狀態</div>
    <div id="settings-sync" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">載入中...</div>
    <button class="btn btn-primary btn-block" onclick="forceSync()"><i class="ti ti-refresh"></i> 強制重新同步</button>
  </div>
  <div class="card" style="margin-top:8px">
    <div style="font-weight:500;margin-bottom:6px">遷移圖片到 Cloudinary</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">把舊的 base64 圖片上傳到 Cloudinary，解決 Firebase 1MB 超限問題</div>
    <button class="btn btn-primary btn-block" onclick="recompressAll()"><i class="ti ti-cloud-upload"></i> 立即遷移</button>
  </div>
  <div class="card" style="margin-top:8px">
    <div style="font-weight:500;margin-bottom:6px">修改類別名稱</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input type="text" id="cat-old" placeholder="原類別名稱" style="flex:1;margin:0">
      <input type="text" id="cat-new" placeholder="新類別名稱" style="flex:1;margin:0">
    </div>
    <button class="btn btn-primary btn-block" onclick="renameCategory()"><i class="ti ti-edit"></i> 確認修改</button>
  </div>
  <div class="card" style="margin-top:8px">
    <div style="font-weight:500;margin-bottom:6px">匯入新商品</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">將本次新增的26項楓之谷網咖商品匯入資料庫（已有的商品不會重複）</div>
    <button class="btn btn-primary btn-block" onclick="importNewProducts()"><i class="ti ti-database-plus"></i> 一鍵匯入新商品</button>
  </div>
  <div class="card" style="margin-top:8px">
    <div style="font-weight:500;margin-bottom:6px">匯出備份</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">將所有資料下載為 JSON 備份檔</div>
    <button class="btn btn-primary btn-block" onclick="exportData()"><i class="ti ti-download"></i> 匯出資料</button>
  </div>
  <div class="card" style="margin-top:8px">
    <div style="font-weight:500;margin-bottom:6px">📦 封存客人記錄</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">已封存的客人訂單，可供查閱或一鍵清除</div>
    <div id="archive-list"></div>
    <button class="btn btn-danger btn-block" style="margin-top:10px" onclick="clearAllArchived()"><i class="ti ti-trash"></i> 一鍵刪除全部封存</button>
  </div>
</div>
</div><!-- end .app -->

<div class="modal-overlay" id="modal-ledger">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-ledger-title">新增記帳</div>
    <input type="hidden" id="edit-ledger-id">
    <label>日期</label><input type="date" id="l-date">
    <label>分類</label>
    <select id="l-cat">
      <option value="運費">運費</option>
      <option value="商品">商品</option>
      <option value="手續費">手續費</option>
      <option value="其他">其他</option>
    </select>
    <label>名目</label><input type="text" id="l-name" placeholder="例：韓國EMS運費">
    <label>金額 (NT$)</label><input type="number" id="l-amount" placeholder="0">
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-ledger')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveLedger()">儲存</button>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-product">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-product-title">新增商品</div>
    <input type="hidden" id="edit-pid">
    <label>商品圖片（選填）</label>
    <div class="img-upload">
      <input type="file" accept="image/*" id="p-file" onchange="handleImg('p-file','p-img-prev','p-img')">
      <div id="p-img-prev"><i class="ti ti-photo-plus" style="font-size:28px;color:var(--text-tertiary);display:block;margin-bottom:4px"></i><div style="font-size:12px;color:var(--text-tertiary)">點此上傳/拍照</div></div>
    </div>
    <input type="hidden" id="p-img-unused">
    <label>商品名稱</label><input type="text" id="p-name">
    <label>分類</label>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <select id="p-cat" style="flex:1;margin-bottom:0"></select>
      <button class="btn btn-sm" type="button" onclick="addNewCat('p-cat')" style="flex-shrink:0;white-space:nowrap"><i class="ti ti-plus"></i> 新類別</button>
    </div>
    <label>韓元原價 (₩)</label><input type="number" id="p-krw" oninput="calcProd()">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div><label>台幣換算</label><input type="text" id="p-twd" readonly style="margin-bottom:0"></div>
      <div><label>建議代購價</label><input type="text" id="p-suggest" readonly style="background:var(--pink-light);color:var(--pink-dark);margin-bottom:0"></div>
    </div>
    <label>代購價 (NT$)</label><input type="number" id="p-price">
    <label>備註</label><input type="text" id="p-note" placeholder="如：不挑款220 挑款280">
    <div id="p-open-order-section" style="display:none">
      <div style="border-top:0.5px solid var(--border);margin:12px 0 10px"></div>
      <div style="font-size:13px;font-weight:500;color:var(--pink);margin-bottom:10px">🛒 同時開單給新客人</div>
      <label>客人代號</label><input type="text" id="p-cust-code" placeholder="例：小美">
      <label>來源平台</label>
      <select id="p-cust-source"><option>LINE</option><option>FB</option><option>Threads</option><option>其他</option></select>
      <label>數量</label><input type="number" id="p-order-qty" value="1" min="1">
      <label>品項備註（許願內容）</label><input type="text" id="p-order-note" placeholder="例：要粉紅色">
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin:10px 0 6px">
      <input type="checkbox" id="p-open-order-toggle" onchange="toggleOpenOrder(this)" style="width:auto;margin:0">
      <label for="p-open-order-toggle" style="font-size:13px;cursor:pointer;color:var(--pink)">同時開單給新客人</label>
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-product')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveProduct()">儲存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-customer">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-customer-title">新增客人</div>
    <input type="hidden" id="edit-cid">
    <label>代號</label><input type="text" id="c-code" placeholder="例：小美、阿志">
    <label>來源平台</label>
    <select id="c-source"><option>LINE</option><option>FB</option><option>Threads</option><option>其他</option></select>
    <label>備註</label><input type="text" id="c-note">
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-customer')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveCustomer()">儲存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-order">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-order-title">新增訂單</div>
    <input type="hidden" id="order-cid">
    <div class="search-wrap"><i class="ti ti-search"></i><input type="text" id="order-search" placeholder="搜尋商品..." oninput="renderOrderProds()"></div>
    <div id="order-cat-chips" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px"></div>
    <div id="order-prod-list" style="max-height:300px;overflow-y:auto;margin-bottom:10px"></div>
    <div id="order-preview" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-order')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveOrder()">確認</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-pay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-pay-title">付款記錄</div>
    <input type="hidden" id="pay-cid">
    <div id="pay-summary" style="margin-bottom:12px"></div>
    <label>實際已付金額 (NT$)</label><input type="number" id="pay-amount" placeholder="0">
    <label>出貨方式</label>
    <select id="pay-shipping"><option value="">未選</option><option value="7-11">7-11</option><option value="全家">全家</option></select>
    <label>出貨單號</label>
    <input type="text" id="pay-tracking" placeholder="輸入出貨單號">
    <label>折扣金額 (NT$)</label><input type="number" id="pay-discount" placeholder="0（輸入優惠折扣）">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <input type="checkbox" id="pay-notified" style="width:auto;margin:0">
      <label for="pay-notified" style="font-size:13px;cursor:pointer">已通知客人</label>
    </div>
    <label>備註</label><input type="text" id="pay-note">
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn" style="flex:1" onclick="closeModal('modal-pay')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="savePayment()">更新</button>
    </div>

let products=[], customers=[], orders=[], payments=[];
let activeCat="all", orderItems={};
let dbReady = false;

function showSyncStatus(msg, type="info") {
  const el = document.getElementById("sync-status");
  if(el) el.innerHTML = msg ? `<div class="sync-bar ${type==="error"?"error":type==="ok"?"success":""}""><i class="ti ti-${type==="error"?"alert-circle":type==="ok"?"check":"refresh"}" style="font-size:16px"></i> ${msg}</div>` : "";
  const ss = document.getElementById("settings-sync");
  if(ss) ss.textContent = msg || "已連線";
}

async function initDB() {
  showSyncStatus("連線中...");
  try {
    const docRef = doc(db, "proxy", "data");
    const snap = await getDoc(docRef);
    if (!snap.exists()) {
      await setDoc(docRef, {
        products: SEED_PRODUCTS,
        customers: SEED_CUSTOMERS,
        orders: SEED_ORDERS,
        payments: [],
        purchaseState: {},
        itemChecked: {},
        shippingState: {},
      });
      showSyncStatus("資料初始化完成", "ok");
    }
    onSnapshot(docRef, (snap) => {
      if(snap.exists()) {
        const d = snap.data();
        products = d.products || [];
        customers = d.customers || [];
        orders = d.orders || [];
        payments = d.payments || [];
        purchaseState = d.purchaseState || {};
        itemChecked = d.itemChecked || {};
        shippingState = d.shippingState || {};
        archivedProducts = d.archivedProducts || {};
        archivedShipping = d.archivedShipping || {};
        archivedOrders = d.archivedOrders || [];
        archivedCustomers = d.archivedCustomers || {};
        ledgerEntries = d.ledgerEntries || [];
        dbReady = true;
        showSyncStatus("", "ok");
        renderAll();
      }
    });
  } catch(e) {
    showSyncStatus("連線失敗：" + e.message, "error");
    products = [...SEED_PRODUCTS];
    customers = [...SEED_CUSTOMERS];
    orders = [...SEED_ORDERS];
    payments = [];
    purchaseState = {};
    itemChecked = {};
    shippingState = {};
    archivedProducts = {};
    archivedShipping = {};
    archivedOrders = [];
    archivedCustomers = {};
    ledgerEntries = [];
    dbReady = false;
    renderAll();
  }
}

async function saveAll() {
  try {
    await setDoc(doc(db, "proxy", "data"), {products, customers, orders, payments, purchaseState, itemChecked, shippingState, archivedProducts, archivedShipping, archivedOrders, archivedCustomers, ledgerEntries});
    showSyncStatus("", "ok");
  } catch(e) {
    showSyncStatus("儲存失敗：" + e.message, "error");
    throw e;
  }
}

async function forceSync() {
  showSyncStatus("同步中...");
  await initDB();
}

window.saveTracking = async function(cid, val) {
  const idx=payments.findIndex(p=>p.cid===cid);
  if(idx>=0)payments[idx].tracking=val;
  else payments.push({cid,amount:0,shipping:"",tracking:val,discount:0,notified:false,note:""});
  await saveAll();
};

  const cards=entries.map(([cid,data])=>{
    const c=data.customer||{};

    const pay=data.payment||{};
    const paid=pay.amount||0;
    const discount=pay.discount||0;
    const items=(data.orders||[]).flatMap(o=>o.items);
    return `<div class="card" style="margin-bottom:6px;padding:8px 10px">
      <div style="display:flex;align-items:center;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">

        <span style="font-size:11px;color:var(--text-tertiary)">${data.archivedAt?new Date(data.archivedAt).toLocaleDateString():''} ▾</span>
      </div>
      <div style="display:none;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border)">
        ${items.map(i=>{const p=products.find(x=>x.id===i.pid);return `<div style="font-size:12px;color:var(--text-secondary);padding:1px 0">${p?p.name:i.name} x${i.qty} — NT$${(i.price*i.qty).toLocaleString()}</div>`;}).join('')}
        <div style="margin-top:4px;font-size:12px;font-weight:500">${discount?`折扣 -NT$${discount.toLocaleString()}　`:''}已付 NT$${paid.toLocaleString()}</div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`
    <button class="btn btn-sm" style="width:100%;justify-content:center;color:var(--text-secondary);margin-bottom:6px" onclick="toggleEl('archive-entries')">
      封存記錄（${entries.length} 筆）▾

    <div id="archive-entries" style="display:none">${cards}</div>`;
}

    sel.innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join("");

  });

function renderProducts() {
  const q=(document.getElementById("prod-search").value||"").toLowerCase();
  const el=document.getElementById("prod-list");
  const activeList=products.filter(p=>!archivedProducts[p.id]&&(activeCat==="all"||p.cat===activeCat)&&(!q||p.name.toLowerCase().includes(q)));
  const archivedList=products.filter(p=>archivedProducts[p.id]&&(activeCat==="all"||p.cat===activeCat)&&(!q||p.name.toLowerCase().includes(q)));

  function prodCard(p, isArchived) {
    return `<div class="card" style="border-left:3px solid ${CAT_COLOR[p.cat]||"#D4537E"};padding:8px 10px${isArchived?';opacity:0.65':''}">
      <div style="display:flex;align-items:center;gap:8px">
        ${p.img?`<img src="${p.img}" class="thumb-lg" onclick="openLight('${p.id}')" style="cursor:pointer" alt="">`:`<div class="thumb-ph" onclick="editProduct('${p.id}')"><i class="ti ti-photo-plus" style="font-size:22px;color:var(--text-tertiary)"></i></div>`}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;margin-bottom:3px">${p.name}</div>
          <div style="font-size:12px;color:var(--text-secondary)">₩${p.krw.toLocaleString()} → NT$${p.twd}</div>
          ${p.note?`<div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">${p.note}</div>`:""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="price-badge">NT$${p.price}</div>
          <div style="display:flex;gap:4px;margin-top:6px;justify-content:flex-end">
            <button class="btn btn-sm" onclick="editProduct('${p.id}')"><i class="ti ti-edit"></i></button>
            <button class="btn btn-sm" onclick="toggleArchiveProduct('${p.id}')" style="color:${isArchived?'var(--green)':'var(--text-tertiary)'};border-color:${isArchived?'var(--green)':'var(--border-strong)'}"><i class="ti ti-${isArchived?'arrow-up':'archive'}" style="font-size:14px"></i></button>
            <button class="btn btn-sm btn-danger" onclick="delProduct('${p.id}')"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`;
  }

  const byCat={};
  activeList.forEach(p=>{(byCat[p.cat]=byCat[p.cat]||[]).push(p)});
  const activeHTML=Object.entries(byCat).map(([cat,items])=>`
    <div class="sec-title">${CAT_EMOJI[cat]||""} ${cat}</div>
    ${items.map(p=>prodCard(p,false)).join("")}`).join("");

  const archivedByCat={};

  const archivedHTML=archivedList.length?`
    <div style="margin-top:16px">
      <button class="btn btn-sm" style="width:100%;justify-content:center;color:var(--text-tertiary)" onclick="document.getElementById('prod-archived').style.display=document.getElementById('prod-archived').style.display==='none'?'block':'none'">
        <i class="ti ti-archive"></i> 收納區（${archivedList.length}）

        ${Object.entries(archivedByCat).map(([cat,items])=>`
          <div class="sec-title">${CAT_EMOJI[cat]||""} ${cat}</div>
          ${items.map(p=>prodCard(p,true)).join("")}`).join("")}
      </div>
    </div>`:"";

  el.innerHTML=(activeHTML||"<div style='text-align:center;padding:40px;color:var(--text-tertiary)'>沒有符合的商品</div>")+archivedHTML;

// ── CUSTOMERS ──
function renderCustomers() {
  const el=document.getElementById("cust-list");
  if(!customers.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">還沒有客人</div>';return}

  function isItemChecked(cid,oid,idx){ return !!itemChecked[`${cid}_${oid}_${idx}`]; }
  function isCustCompleted(c){
    const cOrds=orders.filter(o=>o.cid===c.id);
    if(!cOrds.length)return false;
    return cOrds.every(o=>o.items.every((_,idx)=>isItemChecked(c.id,o.id,idx)));
  }

  function renderCustCard(c, isCompleted) {
    const cOrds=orders.filter(o=>o.cid===c.id);
    const total=cOrds.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.price*i.qty,0),0);
    const pay=payments.find(p=>p.cid===c.id);
    const paid=pay?pay.amount:0;
    const discount=pay?pay.discount||0:0;
    const notified=pay?pay.notified||false:false;
    const remain=Math.max(0,total-discount-paid);
    return `<div class="card" style="border-left:3px solid ${isCompleted?'var(--green)':'var(--pink)'}${isCompleted?';opacity:0.85':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
        <div>
          <span style="font-weight:700;font-size:15px;color:${isCompleted?'var(--green)':'var(--pink)'}">${c.code}</span>
          <span class="tag tag-${c.source}" style="margin-left:8px">${c.source}</span>
          ${isCompleted?`<button class="btn btn-sm" style="margin-left:8px;${notified?'background:var(--green);color:#fff;border-color:var(--green)':'color:var(--green);border-color:var(--green)'}" onclick="toggleNotified('${c.id}')">${notified?'✅ 已通知':'通知客人'}</button>
          <button class="btn btn-sm" style="color:var(--amber);border-color:var(--amber);margin-left:4px" onclick="archiveCustomer('${c.id}')"><i class="ti ti-archive"></i> 封存</button>`:''}
          ${c.name?`<div style="font-size:12px;color:var(--text-secondary);margin-top:3px">${c.name}</div>`:""}
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-primary" onclick="openAddOrder('${c.id}')"><i class="ti ti-plus"></i> 加單</button>
          ${!isCompleted?`<button class="btn btn-sm btn-danger" onclick="deleteCustomerAll('${c.id}')"><i class="ti ti-trash"></i> 刪整筆</button>`:''}
          <button class="btn btn-sm" onclick="editCustomer('${c.id}')"><i class="ti ti-edit"></i></button>
        </div>
      </div>
      ${cOrds.length?`
        ${cOrds.map(o=>o.items.map((i,idx)=>{
          const p=products.find(x=>x.id===i.pid);
          const displayName=p?p.name:i.name;
          const catalogPrice=p?p.price:i.price;
          const priceChanged=p&&i.originalPrice!==undefined&&catalogPrice!==i.originalPrice;
          const checked=isItemChecked(c.id,o.id,idx);
          return `<div class="item-row" style="flex-direction:column;align-items:stretch">
            <div style="display:flex;align-items:center;gap:8px">
              <input type="checkbox" ${checked?'checked':''} onchange="toggleItemChecked('${c.id}','${o.id}',${idx},this.checked)" style="width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--green)">
              ${p&&p.img?`<img src="${p.img}" class="thumb-sm" alt="">`:`<div class="thumb-sm-ph"><i class="ti ti-photo" style="font-size:14px;color:var(--text-tertiary)"></i></div>`}
              <span style="flex:1;font-size:13px${checked?';text-decoration:line-through;color:var(--text-tertiary)':''}">${displayName}</span>
              ${p?catTag(p.cat):""}
              <span style="color:var(--text-secondary);font-size:12px;margin:0 4px">x${i.qty}</span>
              <span style="font-weight:700;font-size:13px">${priceChanged?`<span style="text-decoration:line-through;color:var(--text-tertiary);font-size:11px">原NT$${(i.originalPrice*i.qty).toLocaleString()}</span> <span style="color:var(--amber)">現NT$${(catalogPrice*i.qty).toLocaleString()}</span><br>客人價 NT$${(i.price*i.qty).toLocaleString()}`:`NT$${(i.price*i.qty).toLocaleString()}`}</span>
              ${!isCompleted?`<button class="btn btn-sm btn-danger" style="padding:3px 7px;margin-left:4px" onclick="deleteOrderItem('${o.id}',${idx})"><i class="ti ti-x"></i></button>`:''}
            </div>
            ${i.note?`<div style="font-size:11px;color:var(--pink-dark);background:var(--pink-light);padding:2px 7px;border-radius:4px;margin-top:2px;margin-left:44px">💬 ${i.note}</div>`:""}
          </div>`;
        }).join("")).join("")}
        <div style="margin-top:5px;padding-top:5px;border-top:none">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:14px;font-weight:700">合計 NT$${total.toLocaleString()}</div>
            <button class="btn btn-sm" onclick="openPayModal('${c.id}')" style="color:var(--pink);border-color:var(--pink)"><i class="ti ti-coin"></i> 付款</button>
          </div>
          ${discount>0?`<div style="font-size:12px;color:var(--green);margin-top:3px">折扣 -NT$${discount.toLocaleString()}　實收 NT$${(total-discount).toLocaleString()}</div>`:""}
          ${paid>0?`<div style="font-size:11px;color:var(--green);margin-top:2px">✅ 已付 NT$${paid.toLocaleString()}</div>`:""}
        </div>`:`<div style="font-size:12px;color:var(--text-tertiary)">尚無訂單</div>`}
    </div>`;
  }

  const pending=customers.filter(c=>!isCustCompleted(c)&&!archivedCustomers[c.id]);
  const completed=customers.filter(c=>isCustCompleted(c)&&!archivedCustomers[c.id]);

  el.innerHTML=
    pending.map(c=>renderCustCard(c,false)).join("")+
    (completed.length?`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;margin-bottom:8px">
        <div class="sec-title" style="color:var(--green);margin:0">✅ 已完成分配（${completed.length}）</div>
        <button class="btn btn-sm" onclick="toggleCompletedCollapse()" style="color:var(--green);border-color:var(--green)">
          <i class="ti ti-${collapsedCompleted?'chevron-down':'chevron-up'}"></i> ${collapsedCompleted?'展開':'收起'}
        </button>
      </div>
      ${collapsedCompleted?'':completed.map(c=>renderCustCard(c,true)).join("")}`
    :"");
}

          <span style="flex:1;font-size:13px${checked?';color:var(--pink);font-weight:500':''}">${p.name}</span>

      </div>`;

}

window.setOItemPrice = function(input) {

  }

window.setOItemNote = function(input) {

// ── PURCHASE ──
// purchase state stored in memory (not synced, local session only)
let purchaseState = {};
let itemChecked = {};
let shippingState = {};
let archivedProducts = {};
let collapsedCompleted = false;
let archivedShipping = {};
let archivedOrders = [];
let archivedCustomers = [];
let ledgerEntries = [];

function renderPurchase() {
  const el=document.getElementById("purchase-list");
  const all={};
  orders.filter(o=>!archivedCustomers[o.cid]).forEach(o=>o.items.forEach((i,idx)=>{
    const p=products.find(x=>x.id===i.pid);
    const cat=p?p.cat:"其他";
    if(!all[cat])all[cat]={};
    const key=i.pid+"|"+(p?p.name:i.name);
    if(!all[cat][key])all[cat][key]={name:p?p.name:i.name,totalQty:0,img:p?p.img:"",notes:[]};
    const checked=!!itemChecked[`${o.cid}_${o.id}_${idx}`];
    if(!checked) all[cat][key].totalQty+=i.qty;
    if(i.note)all[cat][key].notes.push({note:i.note,cid:o.cid,oid:o.id,idx,checked});
  }));
  if(!Object.keys(all).length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">還沒有任何訂單</div>';return}
  const catOrder=[...new Set(["樂天世界商品","楓之谷網咖","快閃店","其他",...Object.keys(all)])];
  let html="";
  // Sort: cats with pending items first, fully done cats last
  const catsWithPending=catOrder.filter(c=>all[c]&&Object.values(all[c]).some(i=>i.totalQty>0));
  const catsDone=catOrder.filter(c=>all[c]&&Object.values(all[c]).every(i=>i.totalQty<=0));
  [...catsWithPending,...catsDone].forEach(cat=>{
    let catPending="", catDone="";
    Object.entries(all[cat]).forEach(([key,i])=>{
      const isDone=i.totalQty<=0;
      const row=`<div style="padding:8px 0;border-bottom:0.5px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px">
          ${i.img?`<img src="${i.img}" class="thumb-sm" alt="">`:`<div class="thumb-sm-ph"><i class="ti ti-photo" style="font-size:14px;color:var(--text-tertiary)"></i></div>`}
          <span style="flex:1;font-size:14px${isDone?";text-decoration:line-through;color:var(--text-tertiary)":""}">${i.name}</span>
          ${isDone
            ?`<span style="font-size:12px;color:var(--green)">✅ 全配完</span>`
            :`<span style="font-size:13px;font-weight:700;color:var(--red)">還需 ×${i.totalQty}</span>`}
        </div>
        ${i.notes.length?`<div style="margin-top:4px;margin-left:44px">
          ${i.notes.map(n=>{
            const custName=customers.find(c=>c.id===n.cid);
            return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
              <input type="checkbox" ${n.checked?"checked":""} onchange="toggleItemCheckedFromPurchase('${n.cid}','${n.oid}',${n.idx},this.checked)" style="width:auto;margin:0;flex-shrink:0;accent-color:var(--green)">
              <span style="font-size:12px;${n.checked?"text-decoration:line-through;color:var(--text-tertiary)":"color:var(--pink-dark)"}">
                ${custName?`<span style="color:var(--text-tertiary);font-size:11px">${custName.code}</span> `:""}${n.note}
              </span>
            </div>`;
          }).join("")}
        </div>`:""}
      </div>`;
      if(isDone)catDone+=row; else catPending+=row;
    });
    const doneCount=catDone?catDone.split("border-bottom").length-1:0;
    html+=`<div class="sec-title">${CAT_EMOJI[cat]||""} ${cat}</div>
      ${catPending
        ?`<div class="card" style="border-left:3px solid ${CAT_COLOR[cat]||"var(--pink)"};">${catPending}</div>`
        :`<div style="border-left:3px solid ${CAT_COLOR[cat]||"var(--pink)"};background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:4px 10px;margin-bottom:8px;text-align:right;font-size:11px;color:var(--text-tertiary)">此分類全部完成 ✅</div>`
      }
      ${catDone?`<div style="text-align:right;margin-top:2px"><button class="btn btn-sm" style="font-size:11px;padding:2px 8px;color:var(--green);border-color:var(--green)" onclick="togglePurchaseDone('${cat}')">已完成 ${doneCount} ▾</button></div><div id="purchase-done-${cat}" style="display:none"><div class="card" style="border-left:3px solid var(--green);opacity:0.7">${catDone}</div></div>`:""}`;
  });
  el.innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--text-tertiary)">所有品項已採購完畢！</div>';
}
window.togglePurchaseDone = function(cat) {
  const el=document.getElementById(`purchase-done-${cat}`);
  if(el)el.style.display=el.style.display==='none'?'block':'none';

window.toggleItemCheckedFromPurchase = async function(cid, oid, idx, checked) {

window.toggleNoteDone = async function(key, idx, checked) {

  if(!purchaseState[key].noteDone)purchaseState[key].noteDone={};
  purchaseState[key].noteDone[idx]=checked;
  await saveAll(); renderPurchase();
};
window.toggleItemChecked = async function(cid, oid, idx, checked) {
  const key=`${cid}_${oid}_${idx}`;
  itemChecked[key]=checked;
  await saveAll(); renderCustomers();
};
window.toggleCheck = function(el) {
  const b=el.querySelector(".check-box"); b.classList.toggle("checked");
  const s=el.querySelector("span"); if(s)s.style.textDecoration=b.classList.contains("checked")?"line-through":"";

function renderShipping() {
  const el=document.getElementById("shipping-list");
  if(!el)return;
  const withShipping=customers.filter(c=>{
    const pay=payments.find(p=>p.cid===c.id);
    return pay&&pay.shipping&&(pay.shipping==="7-11"||pay.shipping==="全家");
  });
  if(!withShipping.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">還沒有客人選擇出貨方式</div>';return}

  function custRow(c) {
    const pay=payments.find(p=>p.cid===c.id);
    const cOrds=orders.filter(o=>o.cid===c.id);
    const total=cOrds.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.price*i.qty,0),0);
    const paid=pay?pay.amount:0;
    const discount=pay?pay.discount||0:0;
    const remain=Math.max(0,total-discount-paid);
    const st=shippingState[c.id]||{ordered:false,shipped:false};
    const allItems=cOrds.flatMap(o=>o.items);
    return `<div class="card" style="border-left:3px solid ${st.shipped?'var(--green)':st.ordered?'var(--amber)':'var(--border-strong)'}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <span style="font-weight:700;font-size:15px;color:var(--pink)">${c.code}</span>
          <span class="tag tag-${c.source}" style="margin-left:8px">${c.source}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:14px;font-weight:700;color:${remain>0?'var(--red)':'var(--green)'}">${remain>0?'待付 NT$'+remain.toLocaleString():'已結清'}</span>
          <button class="btn btn-sm" onclick="toggleShipDetail('${c.id}')" id="ship-btn-${c.id}" style="color:var(--pink);border-color:var(--pink)"><i class="ti ti-chevron-down"></i> 展開</button>
        </div>
      </div>
      <div style="display:flex;gap:16px;margin-bottom:4px">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;font-weight:500">
          <input type="checkbox" ${st.ordered?'checked':''} onchange="toggleShipping('${c.id}','ordered',this.checked)" style="width:24px;height:24px;cursor:pointer;accent-color:var(--amber);flex-shrink:0">
          已開單
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;font-weight:500">
          <input type="checkbox" ${st.shipped?'checked':''} onchange="toggleShipping('${c.id}','shipped',this.checked)" style="width:24px;height:24px;cursor:pointer;accent-color:var(--green);flex-shrink:0">
          已出貨
        </label>
      </div>
      <div id="ship-detail-${c.id}" style="display:none;border-top:0.5px solid var(--border);padding-top:8px;margin-top:8px">
        ${allItems.map(i=>{
          const p=products.find(x=>x.id===i.pid);
          const name=p?p.name:i.name;
          return `<div class="item-row">
            ${p&&p.img?`<img src="${p.img}" class="thumb-sm" alt="">`:`<div class="thumb-sm-ph"><i class="ti ti-photo" style="font-size:14px;color:var(--text-tertiary)"></i></div>`}
            <span style="flex:1;font-size:13px">${name}</span>
            <span style="color:var(--text-secondary);font-size:12px">x${i.qty}</span>
            <span style="font-weight:700;font-size:13px;margin-left:8px">NT$${(i.price*i.qty).toLocaleString()}</span>
          </div>${i.note?`<div style="font-size:11px;color:var(--pink-dark);background:var(--pink-light);padding:2px 7px;border-radius:4px;margin-bottom:2px;margin-left:44px">💬 ${i.note}</div>`:''}`;
        }).join('')}
      </div>
    </div>`;
  }

  const groups={'7-11':[],'全家':[]};
  withShipping.forEach(c=>{
    const pay=payments.find(p=>p.cid===c.id);
    if(groups[pay.shipping])groups[pay.shipping].push(c);
  });

  let html='';
  ['7-11','全家'].forEach(method=>{
    const list=groups[method];
    if(!list.length)return;
    const active=list.filter(c=>{ const s=shippingState[c.id]||{}; return !(s.ordered&&s.shipped); });
    const archived=list.filter(c=>{ const s=shippingState[c.id]||{}; return s.ordered&&s.shipped; });
    const sorted=[
      ...active.filter(c=>{ const s=shippingState[c.id]||{}; return !s.ordered; }),
      ...active.filter(c=>{ const s=shippingState[c.id]||{}; return s.ordered&&!s.shipped; }),
    ];
    html+=`<div class="sec-title">📦 ${method}</div>
      ${sorted.map(custRow).join('')}
      ${archived.length?`<button class="btn btn-sm" style="width:100%;justify-content:center;color:var(--green);border-color:var(--green);margin-top:8px" onclick="document.getElementById('ship-archived-${method}').style.display=document.getElementById('ship-archived-${method}').style.display==='none'?'block':'none'">
        <i class="ti ti-archive"></i> 已完成收納（${archived.length}）
      </button>
      <div id="ship-archived-${method}" style="display:none;margin-top:6px">
        ${archived.map(custRow).join('')}
      </div>`:''}`;
  });
  el.innerHTML=html;
}

window.toggleShipping = async function(cid, field, checked) {
  if(!shippingState[cid])shippingState[cid]={ordered:false,shipped:false};
  shippingState[cid][field]=checked;
  if(field==='shipped'&&checked){
    shippingState[cid].ordered=true;
    shippingState[cid].shippedAt=new Date().toISOString();
  }
  if(field==='shipped'&&!checked) delete shippingState[cid].shippedAt;
  await saveAll(); renderPayments();
};
window.toggleShipDetail = function(cid) {
  const detail=document.getElementById('ship-detail-'+cid);
  const btn=document.getElementById('ship-btn-'+cid);
  if(!detail)return;
  const isOpen=detail.style.display!=='none';
  detail.style.display=isOpen?'none':'block';
  btn.innerHTML=isOpen?'<i class="ti ti-chevron-down"></i> 展開':'<i class="ti ti-chevron-up"></i> 收起';
};

function renderPayments() {
  const el=document.getElementById("payment-list");
  if(!customers.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">還沒有客人</div>';return}

  const fromVal=document.getElementById("pay-from")?.value||"";
  const toVal=document.getElementById("pay-to")?.value||"";
  const fromD=fromVal?new Date(fromVal):null;
  const toD=toVal?new Date(toVal+"T23:59:59"):null;

  // Stats: filter by shipped date range if set, else all
  let grand=0,grandPaid=0,grandKrw=0,grandTwd=0;
  customers.forEach(c=>{
    const st=shippingState[c.id]||{};
    const shippedAt=st.shippedAt?new Date(st.shippedAt):null;
    const inRange=(!fromD&&!toD)||(st.shipped&&shippedAt&&(!fromD||shippedAt>=fromD)&&(!toD||shippedAt<=toD));
    if(!inRange&&(fromD||toD))return;
    const cOrds=orders.filter(o=>o.cid===c.id);
    const pay=payments.find(p=>p.cid===c.id);
    const total=cOrds.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.price*i.qty,0),0);
    const paid=pay?pay.amount:0;
    const discount=pay?pay.discount||0:0;
    grand+=total-discount; grandPaid+=paid;
    cOrds.forEach(o=>o.items.forEach(i=>{
      const p=products.find(x=>x.id===i.pid);
      if(p){grandKrw+=p.krw*i.qty; grandTwd+=p.twd*i.qty;}
    }));
  });

  function custRow(c) {
    const cOrds=orders.filter(o=>o.cid===c.id);
    const total=cOrds.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.price*i.qty,0),0);
    const pay=payments.find(p=>p.cid===c.id);
    const paid=pay?pay.amount:0;
    const discount=pay?pay.discount||0:0;
    const notified=pay?pay.notified||false:false;
    const tracking=pay?pay.tracking||"":"";
    const actual=total-discount;
    const remain=Math.max(0,actual-paid);
    const st=shippingState[c.id]||{ordered:false,shipped:false};
    if(!total)return"";
    const paidFull=paid>=actual&&actual>0;
    const paidPartial=paid>0&&paid<actual;
    const bc=paidFull?"var(--green)":paidPartial?"var(--amber)":"var(--red)";
    // Build item list
    const allItems=cOrds.flatMap(o=>o.items);
    const itemRows=allItems.map(i=>{
      const p=products.find(x=>x.id===i.pid);
      const img=p&&p.img?`<img src="${p.img}" style="width:32px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0">`:`<div style="width:32px;height:32px;border-radius:4px;background:var(--gray);flex-shrink:0"></div>`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border)">
        ${img}
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:500;line-height:1.3">${i.name}</div>
          ${i.note?`<div style="font-size:11px;color:var(--text-tertiary)">${i.note}</div>`:""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;font-weight:600">x${i.qty}</div>
          <div style="font-size:11px;color:var(--text-secondary)">NT$${(i.price*i.qty).toLocaleString()}</div>
        </div>
      </div>`;
    }).join("");
    const uid=`items-${c.id}`;
    return `<div class="card" style="padding:10px 12px;border-left:3px solid ${bc};margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-weight:700;color:var(--pink)">${c.code}</span>
        ${notified?'<span style="font-size:11px;color:var(--green)">✅已通知</span>':''}
        <button class="btn btn-sm" onclick="toggleEl('${uid}')" style="font-size:11px;padding:2px 7px;color:var(--text-secondary)">品項 ${allItems.length} ▾</button>
        <button class="btn btn-sm" onclick="openPayModal('${c.id}')" style="margin-left:auto;color:var(--pink);border-color:var(--pink);padding:3px 8px"><i class="ti ti-edit"></i></button>
      </div>
      <div id="${uid}" style="display:none;margin-top:6px;padding-top:4px">${itemRows}</div>
      <div style="display:flex;gap:8px;margin-top:6px;font-size:12px;flex-wrap:wrap">
        <span>應付 <strong>NT$${actual.toLocaleString()}</strong></span>
        ${discount?`<span style="color:var(--green)">折 -NT$${discount.toLocaleString()}</span>`:""}
        <span style="color:${paid>0?"var(--green)":"var(--text-tertiary)"}">已付 <strong>NT$${paid.toLocaleString()}</strong></span>
        <span style="color:${remain>0?"var(--red)":"var(--green)"}">待付 <strong>${remain>0?"NT$"+remain.toLocaleString():"已結清"}</strong></span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-top:8px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" ${st.ordered?'checked':''} onchange="toggleShipping('${c.id}','ordered',this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--amber);flex-shrink:0">
          已開單
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" ${st.shipped?'checked':''} onchange="toggleShipping('${c.id}','shipped',this.checked)" style="width:18px;height:18px;cursor:pointer;accent-color:var(--green);flex-shrink:0">
          已出貨
        </label>
        ${st.shipped?`<input type="text" value="${tracking}" placeholder="出貨單號" onchange="saveTracking('${c.id}',this.value)" style="flex:1;margin:0;padding:4px 8px;font-size:12px">`:''}
      </div>
    </div>`;
  }

  const sources=['LINE','FB','Threads','其他'];
  const bySrc={};
  customers.forEach(c=>{(bySrc[c.source]=bySrc[c.source]||[]).push(c)});

  let srcRows="";
  sources.filter(s=>bySrc[s]&&bySrc[s].length).forEach(s=>{
    const active=bySrc[s].filter(c=>{ const st=shippingState[c.id]||{}; return !st.shipped; });
    const shipped=bySrc[s].filter(c=>{ const st=shippingState[c.id]||{}; return st.shipped; });
    const activeRows=active.map(custRow).join("");
    const shippedRows=shipped.map(custRow).join("");
    srcRows+=`<div class="sec-title">${s}</div>
      ${activeRows||""}
      ${shippedRows?`<div style="text-align:right;margin:4px 0">
        <button class="btn btn-sm" style="font-size:11px;padding:2px 8px;color:var(--green);border-color:var(--green)" onclick="toggleEl('shipped-${s}')">已出貨 ${shipped.length} ▾</button>
      </div>
      <div id="shipped-${s}" style="display:none">${shippedRows}</div>`:""}`;
  });

  const gr=grand-grandPaid;
  const profit=grand-grandTwd;
  const rangeLabel=fromVal||toVal?` （${fromVal||""}～${toVal||""}）`:"";
  el.innerHTML=`
    <div class="card" style="border-left:3px solid var(--pink);margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px;color:var(--pink)">📊 統計${rangeLabel}</div>
      <div class="stat-grid">
        <div class="stat-box" style="background:var(--gray)"><div class="lbl">總韓元</div><div class="val" style="font-size:13px">₩${grandKrw.toLocaleString()}</div></div>
        <div class="stat-box" style="background:var(--gray)"><div class="lbl">台幣換算</div><div class="val" style="font-size:13px">NT$${grandTwd.toLocaleString()}</div></div>
        <div class="stat-box" style="background:var(--pink-light)"><div class="lbl" style="color:var(--pink)">代購收入</div><div class="val" style="font-size:13px;color:var(--pink-dark)">NT$${grand.toLocaleString()}</div></div>
        <div class="stat-box" style="background:var(--green-light)"><div class="lbl" style="color:var(--green)">估算利潤</div><div class="val" style="font-size:13px;color:var(--green)">NT$${profit.toLocaleString()}</div></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:10px;font-size:13px">
        <span>總應收 <strong>NT$${grand.toLocaleString()}</strong></span>
        <span style="color:${gr>0?"var(--red)":"var(--green)"}">待收 <strong>${gr>0?"NT$"+gr.toLocaleString():"全收清"}</strong></span>
      </div>
    </div>
    ${srcRows||'<div style="text-align:center;padding:20px;color:var(--text-tertiary)">還沒有客人</div>'}
  `;
}

window.openPayModal = function(cid) {
  const c=customers.find(x=>x.id===cid);
  const cOrds=orders.filter(o=>o.cid===cid);
  const total=cOrds.reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.price*i.qty,0),0);
  const pay=payments.find(p=>p.cid===cid);
  document.getElementById("pay-cid").value=cid;
  document.getElementById("modal-pay-title").textContent=(c?c.code:"")+" — 付款記錄";
  document.getElementById("pay-amount").value=pay?pay.amount:"";
  document.getElementById("pay-shipping").value=pay?pay.shipping||"":"";
  document.getElementById("pay-tracking").value=pay?pay.tracking||"":"";
  document.getElementById("pay-discount").value=pay?pay.discount||"":"";
  document.getElementById("pay-notified").checked=pay?pay.notified||false:false;
  document.getElementById("pay-note").value=pay?pay.note:"";
  const discount=pay?pay.discount||0:0;
  document.getElementById("pay-summary").innerHTML=`<div style="background:var(--pink-light);border-radius:var(--radius-sm);padding:10px;font-size:13px;color:var(--pink-dark)">訂單總額：<strong>NT$${total.toLocaleString()}</strong>${discount?`　折扣：<strong>-NT$${discount.toLocaleString()}</strong>　實收：<strong>NT$${(total-discount).toLocaleString()}</strong>`:""}　建議訂金：<strong>NT$${Math.ceil((total-discount)*0.5).toLocaleString()}</strong></div>`;
  openModal("modal-pay");
};
window.savePayment = async function() {
  const cid=document.getElementById("pay-cid").value;
  const amount=parseFloat(document.getElementById("pay-amount").value)||0;
  const shipping=document.getElementById("pay-shipping").value;
  const tracking=document.getElementById("pay-tracking").value.trim();
  const discount=parseFloat(document.getElementById("pay-discount").value)||0;
  const notified=document.getElementById("pay-notified").checked;
  const note=document.getElementById("pay-note").value.trim();
  const idx=payments.findIndex(p=>p.cid===cid);
  if(idx>=0)payments[idx]={cid,amount,shipping,tracking,discount,notified,note};
  else payments.push({cid,amount,shipping,tracking,discount,notified,note});
  await saveAll(); closeModal("modal-pay"); renderCustomers(); renderPayments();
};

  const twd=Math.round(krw*RATE);

};

const CLOUDINARY_CLOUD = "dkuseooqg";
const CLOUDINARY_PRESET = "proxy_upload";
let currentEditImg = "";

async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
    method: "POST",
    body: formData
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error?.message || "上傳失敗");
  return data.secure_url;
}

window.handleImg = function(inp,prev,dat) {
  const f=document.getElementById(inp).files[0]; if(!f)return;
  const prevEl=document.getElementById(prev);
  prevEl.innerHTML=`<div style="color:var(--text-tertiary);font-size:12px">上傳中...</div>`;
  uploadToCloudinary(f).then(url=>{
    if(dat==="p-img") currentEditImg=url;
    else document.getElementById(dat).value=url;
    prevEl.innerHTML=`<img src="${url}" style="max-width:100%;max-height:140px;border-radius:8px;object-fit:cover">`;
  }).catch(err=>{
    prevEl.innerHTML=`<div style="color:var(--red);font-size:12px">上傳失敗：${err.message}</div>`;
  });
};
window.exportData = function() {
  const data={products,customers,orders,payments,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="proxy-data-"+new Date().toISOString().slice(0,10)+".json"; a.click();
};

window.renameCategory = async function() {
  const oldName=document.getElementById('cat-old').value.trim();
  const newName=document.getElementById('cat-new').value.trim();
  if(!oldName||!newName){alert('請填入原類別名稱和新類別名稱');return}
  let count=0;
  products.forEach(p=>{if(p.cat===oldName){p.cat=newName;count++;}});
  if(!count){alert(`找不到「${oldName}」這個類別`);return}
  await saveAll();
  renderProducts(); renderCatChips(); updateCatList();
  document.getElementById('cat-old').value='';
  document.getElementById('cat-new').value='';
  alert(`已將「${oldName}」改為「${newName}」，共更新 ${count} 項商品`);
};

window.recompressAll = async function() {
  const withBase64 = products.filter(p=>p.img&&p.img.startsWith("data:"));
  if(!withBase64.length){alert('所有圖片已是 Cloudinary URL，無需遷移！');return}
  if(!confirm(`將遷移 ${withBase64.length} 張 base64 圖片到 Cloudinary，請確保網路正常，確定嗎？`))return;
  let done=0, failed=0;
  for(const p of withBase64){
    try {
      const res=await fetch(p.img);
      const blob=await res.blob();
      const file=new File([blob],"product.jpg",{type:"image/jpeg"});
      p.img=await uploadToCloudinary(file);
      done++;
    } catch(e) {
      console.error("遷移失敗:", p.name, e);
      failed++;
    }
  }
  await saveAll();
  alert(`完成！成功 ${done} 張${failed?`，失敗 ${failed} 張`:""}。`);
  renderProducts();
};
function openModal(id){document.getElementById(id).classList.add("open")}
function closeModal(id){document.getElementById(id).classList.remove("open")}
window.closeModal = closeModal;

// ── LEDGER ──
function renderLedger() {
  const el=document.getElementById("ledger-list");
  const sumEl=document.getElementById("ledger-summary");
  if(!el)return;
  const fromVal=document.getElementById("ledger-from")?.value||"";
  const toVal=document.getElementById("ledger-to")?.value||"";
  const fromD=fromVal?new Date(fromVal):null;
  const toD=toVal?new Date(toVal+"T23:59:59"):null;
  const filtered=ledgerEntries.filter(e=>{
    if(!fromD&&!toD)return true;
    const d=new Date(e.date);
    return (!fromD||d>=fromD)&&(!toD||d<=toD);
  }).sort((a,b)=>b.date.localeCompare(a.date));
  // Summary
  const cats=['運費','商品','手續費','其他'];
  const totals={};
  let grandTotal=0;
  filtered.forEach(e=>{totals[e.cat]=(totals[e.cat]||0)+e.amount; grandTotal+=e.amount;});
  sumEl.innerHTML=filtered.length?`<div class="card" style="border-left:3px solid var(--pink);margin-bottom:8px">
    <div style="font-weight:700;font-size:13px;color:var(--pink);margin-bottom:8px">支出統計${fromVal||toVal?` （${fromVal||""}～${toVal||""}）`:""}</div>
    <div class="stat-grid">
      ${cats.filter(c=>totals[c]).map(c=>`<div class="stat-box" style="background:var(--gray)"><div class="lbl">${c}</div><div class="val" style="font-size:14px">NT$${totals[c].toLocaleString()}</div></div>`).join("")}
    </div>
    <div style="margin-top:8px;font-size:13px;font-weight:700">總計 NT$${grandTotal.toLocaleString()}</div>
  </div>`:"";
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-tertiary)">沒有記帳記錄</div>';return}
  el.innerHTML=filtered.map(e=>`<div class="card" style="padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px">
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500">${e.name}</div>
      <div style="font-size:11px;color:var(--text-tertiary)">${e.date} · ${e.cat}</div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--red)">-NT$${e.amount.toLocaleString()}</div>
    <button class="btn btn-sm btn-danger" style="padding:3px 7px" onclick="deleteLedger('${e.id}')"><i class="ti ti-trash"></i></button>
  </div>`).join("");
}
window.openAddLedger = function() {
  document.getElementById("modal-ledger-title").textContent="新增記帳";
  document.getElementById("edit-ledger-id").value="";
  document.getElementById("l-date").value=new Date().toISOString().slice(0,10);
  document.getElementById("l-cat").value="運費";
  document.getElementById("l-name").value="";
  document.getElementById("l-amount").value="";
  openModal("modal-ledger");
};
window.saveLedger = async function() {
  const id=document.getElementById("edit-ledger-id").value;
  const data={
    id:id||"l"+Date.now(),
    date:document.getElementById("l-date").value,
    cat:document.getElementById("l-cat").value,
    name:document.getElementById("l-name").value.trim(),
    amount:parseFloat(document.getElementById("l-amount").value)||0,
  };
  if(!data.name||!data.amount)return;
  if(id){const i=ledgerEntries.findIndex(x=>x.id===id);if(i>=0)ledgerEntries[i]=data}
  else ledgerEntries.push(data);
  await saveAll(); closeModal("modal-ledger"); renderLedger();
};
window.deleteLedger = async function(id) {
  ledgerEntries=ledgerEntries.filter(e=>e.id!==id);
  await saveAll(); renderLedger();
};
window.clearLedgerFilter = function() {
  document.getElementById("ledger-from").value="";
  document.getElementById("ledger-to").value="";
  renderLedger();
};
